[package]
name = "incremental-code"
version = "0.1.0"
edition = "2024"

[dependencies]
ratatui = { version = "0.30.0", default-features = false }
ratatui-code-editor = { git = "https://github.com/atollk/ratatui-code-editor/", rev="96800ce1496547f35c1721d24e8c44067b9da0bb", default-features = false }
tachyonfx = "0.25.0"
thiserror = "2.0.18"
beamterm-renderer = { version = "1.0.0", optional = true }
beamterm-core = { version = "1.0.0", optional = true }
ratzilla = { version = "0.3.0", optional = true }
ratbeam = { git = "https://github.com/atollk/ratbeam", branch="main", optional = true }
crossterm = { version = "0.29.0", optional = true }
glutin = { version="0.32" , optional = true}
winit = { version="0.30" , optional = true}
glutin-winit = { version="0.5" , optional = true}
raw-window-handle = { version="0.6" , optional = true}
glow = { version = "0.17.0", optional = true }
tree-sitter = { version = "0.26.8" }

[package.metadata.bin]
trunk = { version = "0.21.14" }

[features]
tui = [
    "dep:crossterm",
    "ratatui/crossterm",
    "ratatui-code-editor/crossterm",
]
opengl = [
    "dep:beamterm-core",
    "dep:beamterm-renderer",
    "dep:ratbeam",
    'dep:glutin',
    'dep:winit',
    'dep:glow',
    'dep:glutin-winit',
    'dep:raw-window-handle',
]
web = [
    "dep:ratzilla",
    "dep:beamterm-renderer",
    "tree-sitter/wasm",
]
