[package]
name = "incremental-code"
version = "0.1.0"
edition = "2024"

[dependencies]
ratatui = { version = "0.30.0", default-features = false }
ratzilla = { version = "0.3.0", optional = true }
#ratatui-code-editor = { git = "https://github.com/atollk/ratatui-code-editor/", rev="96800ce1496547f35c1721d24e8c44067b9da0bb", default-features = false }
tachyonfx = "0.25.0"
beamterm-core = { version = "^1.0", optional = true }
wasm-bindgen = { version = "0.2", optional = true }
web-sys = { version = "0.3", features = ["EventTarget", "Worker", "WorkerOptions", "WorkerType", "MessageEvent", "HtmlCanvasElement"], optional = true }
ratbeam = { git = "https://github.com/atollk/ratbeam", branch = "main", optional = true }
crossterm = { version = "0.29.0", optional = true }
glutin = { version = "0.32", optional = true }
winit = { version = "0.30", optional = true }
winit-web = { version = "0.31.0-beta.2", optional = true }
glutin-winit = { version = "0.5", optional = true }
raw-window-handle = { version = "0.6", optional = true }
glow = { version = "0.17.0", optional = true }
egui_ratatui = { version = "2.1.0", optional = true }
soft_ratatui = { version = "0.1.4", optional = true, features = ["unicodefonts"] }
eframe = { version = "~0.33.0", optional = true }
log = "0.4.29"
wasm-bindgen-futures = { version = "0.4", optional = true }
#tree-sitter = { version = "0.26.8", default-features = false, features = ["std"] }

[package.metadata.bin]
trunk = { version = "0.21.14" }

[features]
tui = [
    "dep:crossterm",
    "ratatui/crossterm",
    #    "ratatui-code-editor/crossterm",
]
opengl = [
    "dep:beamterm-core",
    "dep:ratbeam",
    'dep:glutin',
    'dep:winit',
    'dep:glow',
    'dep:glutin-winit',
    'dep:raw-window-handle',
]
web = [
    "dep:wasm-bindgen",
    "dep:web-sys",
    "dep:egui_ratatui",
    "dep:soft_ratatui",
    "dep:eframe",
    "dep:wasm-bindgen",
    "dep:wasm-bindgen-futures",
    #    "tree-sitter/wasm"
]

[profile.dev]
codegen-units = 1

[profile.dev.package.beamterm-renderer]
